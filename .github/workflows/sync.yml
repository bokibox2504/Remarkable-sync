name: Sync Google Calendar to reMarkable

on:
  schedule:
    - cron: "30 4 * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r Scripts/requirements.txt

      - name: Debug ICS_URL
        env:
          ICS_URL: ${{ secrets.ICS_URL }}
        run: |
          echo "Duzina linka: ${#ICS_URL}"
          echo "Prvih 10 karaktera: ${ICS_URL:0:10}"

      - name: Generate schedule PDF
        env:
          ICS_URL: ${{ secrets.ICS_URL }}
          DAYS_AHEAD: "7"
          TIMEZONE: "Europe/Belgrade"
        run: python3 Scripts/generate_schedule.py

      - name: Install rmapi
        run: |
          curl -L https://github.com/ddvk/rmapi/releases/download/v0.0.29/rmapi-linuxx86-64.tar.gz -o rmapi.tar.gz
          tar -xzf rmapi.tar.gz
          chmod +x rmapi
          sudo mv rmapi /usr/local/bin/rmapi

      - name: Restore rmapi auth config
        run: |
          mkdir -p ~/.config/rmapi
          printf '%s\n' "${{ secrets.RMAPI_CONFIG }}" > ~/.config/rmapi/rmapi.conf

      - name: Upload to reMarkable
        run: |
          rmapi mkdir /Raspored || true
          rmapi put output/raspored.pdf /Raspored
